description: >
  Книга для начинающих, которая поможет с нуля освоить язык SQL
  и понять принципы работы реляционных баз данных. Вы познакомитесь с
  устройством таблиц, научитесь писать SQL-запросы, выбирать, фильтровать и
  сортировать данные, использовать базовые функции. Материал объясняется простым языком, не требует опыта
  программирования и построен по принципу «от простого к сложному». Книга
  подойдет студентам, начинающим разработчикам, аналитикам, тестировщикам и
  всем, кто хочет уверенно освоить основы SQL.

